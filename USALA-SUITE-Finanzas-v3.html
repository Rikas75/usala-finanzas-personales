<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Exxito Finanzas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
background:#1e293b;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#22c55e;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
Exxito Finanzas
</header>

<div class="container">

<div class="card">

<h3>Agregar Transacción</h3>

<input id="descripcion" placeholder="Descripción">

<input id="monto" type="number" placeholder="Monto">

<select id="tipo">
<option value="gasto">Gasto</option>
<option value="ingreso">Ingreso</option>
</select>

<button onclick="guardar()">Guardar</button>

</div>

<div class="card">

<h3>Dashboard</h3>

<canvas id="grafica"></canvas>

</div>

</div>

<script>

const SUPABASE_URL="https://aphccdnydowrkbzjmqsw.supabase.co"
const SUPABASE_KEY="sb_publishable_vYgkon6qP3ZymsfrGhpAvw_ynUaEGnV"

const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function guardar(){

const descripcion=document.getElementById("descripcion").value
const monto=document.getElementById("monto").value
const tipo=document.getElementById("tipo").value

await supabaseClient
.from("transacciones")
.insert([{descripcion,monto,tipo,fecha:new Date()}])

alert("Guardado")

cargar()

}

async function cargar(){

const {data}=await supabaseClient
.from("transacciones")
.select("*")

let gastos=0
let ingresos=0

data.forEach(t=>{

if(t.tipo=="gasto")gastos+=Number(t.monto)
else ingresos+=Number(t.monto)

})

dibujar(gastos,ingresos)

}

function dibujar(gastos,ingresos){

new Chart(document.getElementById("grafica"),{

type:"doughnut",

data:{
labels:["Gastos","Ingresos"],
datasets:[{
data:[gastos,ingresos]
}]
}

})

}

cargar()

</script>

</body>
</html>
