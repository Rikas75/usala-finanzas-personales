const LISTENERS=[];
function notifyAll(){LISTENERS.forEach(fn=>fn());}
function useStore(keys){
  const[,forceUpdate]=useState(0);
  useEffect(()=>{
    const fn=()=>forceUpdate(n=>n+1);
    LISTENERS.push(fn);
    return()=>{const i=LISTENERS.indexOf(fn);if(i>-1)LISTENERS.splice(i,1);};
  },[]);
}
async function fbSave(col,id,data){
  try{
    if(window._db&&window._fs){
      await window._fs.setDoc(window._fs.doc(window._db,col,id),{data:JSON.stringify(data),ts:Date.now()});
    }
  }catch(e){console.warn("FB save error",e);}
  localStorage.setItem("sn_"+col,JSON.stringify(data));
}
async function fbSaveItem(col,item){
  try{
    if(window._db&&window._fs){
      await window._fs.setDoc(window._fs.doc(window._db,col,item.id||col),{...item,ts:Date.now()});
    }
  }catch(e){console.warn("FB save error",e);}
}
function setupListeners(){
  if(!window._db||!window._fs)return;
  const cols=["productos","ventas","colaboradores","proveedores","gastos","entradas"];
  cols.forEach(col=>{
    window._fs.onSnapshot(window._fs.collection(window._db,col),snap=>{
      const items=[];
      snap.forEach(d=>{const dat=d.data();if(dat.data){try{const parsed=JSON.parse(dat.data);if(Array.isArray(parsed)){items.push(...parsed);}else{STORE[col]=parsed;notifyAll();return;}}catch(e){}}else{items.push({...dat});}});
      if(items.length>0||snap.size===0){STORE[col]=items;localStorage.setItem("sn_"+col,JSON.stringify(items));notifyAll();}
    });
  });
  // users and brand
  ["users","brand"].forEach(col=>{
    window._fs.onSnapshot(window._fs.collection(window._db,col),snap=>{
      snap.forEach(d=>{
        const dat=d.data();
        if(dat.data){try{STORE[col]=JSON.parse(dat.data);localStorage.setItem("sn_"+col,JSON.stringify(STORE[col]));notifyAll();}catch(e){}}
      });
    });
  });
}

function Dashboard({user}){
  const br=DB.brand();
  const ventas=DB.ventas();

  const ventasSemana=ventas.filter(v=>{const d=new Date(v.fecha);const s=new Date();s.setDate(s.getDate()-7);return d>=s;});
  const totalHoy=ventasHoy.reduce((a,v)=>a+Number(v.total||0),0);
  const utilidadHoy=ventasHoy.reduce((a,v)=>a+Number(v.utilidad||0),0);
  const totalSemana=ventasSemana.reduce((a,v)=>a+Number(v.total||0),0);
  const utilidadSemana=ventasSemana.reduce((a,v)=>a+Number(v.utilidad||0),0);

  const colaboradores=DB.colaboradores();

    <div style={{marginBottom:16}}>
      <div style={{fontSize:"1.3rem",fontWeight:900,color:G.text}}>Buen día, {user.name.split(" ")[0]} 👋</div>

    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>

      <StatCard label="Ventas 7 días" value={fmt(totalSemana)} sub={`${ventasSemana.length} ventas`} color={br.accent2} icon="📊"/>
      <StatCard label="Utilidad 7d" value={fmt(utilidadSemana)} sub={utilidadSemana>0?`${Math.round((utilidadSemana/totalSemana)*100)||0}% margen`:"-"} color={G.green} icon="💹"/>
    </div>

        <div><div style={{fontSize:"0.85rem",fontWeight:600,color:G.yellow}}>{stockBajo} producto{stockBajo>1?"s":""} con stock bajo</div>
        <div style={{fontSize:"0.72rem",color:G.dim}}>Revisa el módulo de Productos</div></div>
      </div>
    </Card>}
    <Card style={{padding:"16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:"0.85rem",marginBottom:14,color:G.text}}>Ventas vs Utilidad — 7 días</div>

  </div>;

function Ventas({user,isAdmin}){
  const br=DB.brand();
  const[tab,setTab]=useState("historial");
  const[modal,setModal]=useState(false);
  const[toast,setToast]=useState("");
  const[ventas,setVentas]=useState(DB.ventas());
  const[productos]=useState(DB.productos());
  const[colaboradores]=useState(DB.colaboradores());
  const[filtro,setFiltro]=useState("hoy");
  // Form nueva venta
  const[prod,setProd]=useState("");
  const[qty,setQty]=useState("1");
  const[vendedorId,setVendedorId]=useState(user.role==="admin"?"":user.email);
  const[pagMethod,setPagMethod]=useState("efectivo");
  const[descuento,setDescuento]=useState("0");
  const[scanner,setScanner]=useState(false);
  const[busqueda,setBusqueda]=useState("");
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}
  function handleScan(codigo){
    setScanner(false);
    const prods=DB.productos();
    const p=prods.find(x=>x.codigo&&x.codigo===codigo);
    if(p){setProd(p.id);setModal(true);toast_(`✓ Producto: ${p.nombre}`);}
    else{setBusqueda(codigo);setModal(true);toast_(`⚠ Código no registrado — selecciona manualmente`,"#FFCC02");}
  }
  function nuevaVenta(){
    if(!prod||!qty||Number(qty)<1){toast_("⚠ Completa los campos","#ff3d6e");return;}
    const p=productos.find(x=>x.id===prod);
    if(!p){toast_("⚠ Producto no encontrado","#ff3d6e");return;}
    if(Number(p.stock||0)<Number(qty)){toast_("⚠ Stock insuficiente","#ff3d6e");return;}
    const colabs=DB.colaboradores();const vend=colabs.find(c=>c.id===vendedorId)||{nombre:user.nombre||user.email,comision:10};
    const subtotal=Number(p.precio)*Number(qty);
    const desc=Math.min(Number(descuento||0),subtotal);
    const total=subtotal-desc;
    const costo=Number(p.costo)*Number(qty);
    const utilidad=total-costo;
    const comisionMonto=total*(Number(vend.comision||10)/100);
    const v={id:uid(),producto:p.nombre,productoId:p.id,cantidad:Number(qty),precioUnit:p.precio,
      subtotal,descuento:desc,total,costo,utilidad,comisionMonto,
      vendedor:vend.nombre||vend.name||user.email,vendedorId,metodoPago:pagMethod,fecha:today(),hora:new Date().toLocaleTimeString("es-MX")};
    const nv=[...ventas,v];
    // actualizar stock
    const prods=DB.productos().map(x=>x.id===prod?{...x,stock:Number(x.stock)-Number(qty)}:x);
    DB.saveProductos(prods);DB.saveVentas(nv);setVentas(nv);
    setModal(false);setProd("");setQty("1");setDescuento("0");
    toast_(`✓ Venta registrada — ${fmt(total)}`);
  }
  const hoy=today();
  const filtered=ventas.filter(v=>{
    if(filtro==="hoy")return v.fecha===hoy;
    if(filtro==="semana"){const d=new Date(v.fecha);const s=new Date();s.setDate(s.getDate()-7);return d>=s;}
    if(filtro==="mes"){const d=new Date(v.fecha);const m=new Date();m.setDate(m.getDate()-30);return d>=m;}
    return true;
  });
  const totalFiltro=filtered.reduce((a,v)=>a+Number(v.total||0),0);
  const utilidadFiltro=filtered.reduce((a,v)=>a+Number(v.utilidad||0),0);
  // informe por vendedor
  const porVendedor={};filtered.forEach(v=>{const key=v.vendedor||"Sin asignar";if(!porVendedor[key])porVendedor[key]={ventas:0,total:0,utilidad:0,comision:0};porVendedor[key].ventas++;porVendedor[key].total+=Number(v.total||0);porVendedor[key].utilidad+=Number(v.utilidad||0);porVendedor[key].comision+=Number(v.comisionMonto||0);});
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div><div style={{fontWeight:800,fontSize:"1.1rem"}}>Ventas</div><div style={{fontSize:"0.7rem",color:G.dim}}>{filtered.length} registros</div></div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setScanner(true)} color={G.blue} small>📷 Scan</Btn><Btn onClick={()=>setModal(true)} color={br.accent} small>+ Nueva venta</Btn></div>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto"}}>
        {[["hoy","Hoy"],["semana","7 días"],["mes","30 días"],["todo","Todo"]].map(([f,l])=>
          <Pill key={f} active={filtro===f} color={br.accent} onClick={()=>setFiltro(f)}>{l}</Pill>)}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px 16px",flexShrink:0}}>
      <Card style={{padding:"12px 14px"}}><div style={{fontSize:"0.65rem",color:G.dim,marginBottom:4}}>TOTAL</div><div style={{fontWeight:900,fontSize:"1.2rem",color:br.accent}}>{fmt(totalFiltro)}</div></Card>
      <Card style={{padding:"12px 14px"}}><div style={{fontSize:"0.65rem",color:G.dim,marginBottom:4}}>UTILIDAD</div><div style={{fontWeight:900,fontSize:"1.2rem",color:G.green}}>{fmt(utilidadFiltro)}</div></Card>
    </div>
    <div style={{display:"flex",borderBottom:`1px solid ${G.gb}`,flexShrink:0,padding:"0 16px"}}>
      {[["historial","Historial"],["vendedor","Por vendedor"]].map(([t,l])=>
        <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 4px",border:"none",background:"none",borderBottom:`2px solid ${tab===t?br.accent:"transparent"}`,color:tab===t?br.accent:G.dim,fontFamily:G.font,fontSize:"0.78rem",fontWeight:tab===t?700:400,cursor:"pointer"}}>{l}</button>)}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",paddingBottom:80}}>
      {tab==="historial"&&<>{filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:G.dim}}>Sin ventas en este período</div>}
        {filtered.slice().reverse().map((v,i)=><Card key={i} style={{padding:"14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontWeight:700,fontSize:"0.88rem"}}>{v.producto}</div>
            <div style={{fontWeight:700,color:br.accent}}>{fmt(v.total)}</div>
          </div>
          <div style={{display:"flex",gap:12,fontSize:"0.7rem",color:G.dim}}>
            <span>x{v.cantidad}</span><span>{v.vendedor}</span><span>{v.metodoPago}</span><span>{v.fecha}</span>
          </div>
          <div style={{display:"flex",gap:12,marginTop:6,fontSize:"0.72rem"}}>
            <span style={{color:G.green}}>Utilidad: {fmt(v.utilidad)}</span>
            <span style={{color:G.yellow}}>Comisión: {fmt(v.comisionMonto)}</span>
          </div>
          {isAdmin&&<button onClick={()=>{const all=DB.ventas();const nv=all.filter(x=>x.id!==v.id);DB.saveVentas(nv);setVentas(nv);if(v.productoId){const prods=DB.productos();DB.saveProductos(prods.map(p=>p.id===v.productoId?{...p,stock:Number(p.stock||0)+Number(v.cantidad||1)}:p));}pushUndo({label:`Venta "${v.producto}" eliminada`,undo:()=>{const r=[...DB.ventas(),v];DB.saveVentas(r);setVentas(r);if(v.productoId){const prods=DB.productos();DB.saveProductos(prods.map(p=>p.id===v.productoId?{...p,stock:Math.max(0,Number(p.stock||0)-Number(v.cantidad||1))}:p));}}});}} style={{marginTop:8,width:"100%",padding:"5px",background:"rgba(255,61,110,0.08)",border:"1px solid rgba(255,61,110,0.2)",borderRadius:8,color:"#ff3d6e",fontSize:"0.7rem",cursor:"pointer"}}>✕ Eliminar venta</button>}
        </Card>)}</>}
      {tab==="vendedor"&&<>{Object.keys(porVendedor).length===0&&<div style={{textAlign:"center",padding:"50px 0",color:G.dim}}>Sin datos</div>}
        {Object.entries(porVendedor).sort((a,b)=>b[1].total-a[1].total).map(([nombre,d],i)=><Card key={i} style={{padding:"16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:38,height:38,borderRadius:12,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:br.accent,fontSize:"1rem"}}>{nombre[0]}</div>
              <div><div style={{fontWeight:700}}>{nombre}</div><div style={{fontSize:"0.7rem",color:G.dim}}>{d.ventas} ventas</div></div>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontWeight:800,color:br.accent}}>{fmt(d.total)}</div><div style={{fontSize:"0.7rem",color:G.green}}>{fmt(d.utilidad)} util.</div></div>
          </div>
          <div style={{height:4,borderRadius:4,background:G.dim2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((d.total/totalFiltro)*100,100)}%`,background:`linear-gradient(90deg,${br.accent},${br.accent2})`,borderRadius:4}}/></div>
          <div style={{fontSize:"0.7rem",color:G.yellow,marginTop:6}}>Comisiones: {fmt(d.comision)}</div>
        </Card>)}</>}
    </div>
    {modal&&<Modal title="Nueva Venta" onClose={()=>setModal(false)}>
      {(()=>{
        const allProds=DB.productos();
        const filteredProds=busqueda?allProds.filter(p=>p.nombre.toLowerCase().includes(busqueda.toLowerCase())||( p.codigo&&p.codigo.includes(busqueda))):allProds;
        return <>
          <Inp label="Buscar producto" placeholder="Escribe nombre o código..." value={busqueda} onChange={v=>{setBusqueda(v);setProd("");}} icon="🔍"/>
          <Sel label="Producto" value={prod} onChange={v=>{setProd(v);}} options={[{v:"",l:filteredProds.length===0?"Sin resultados...":"Seleccionar producto..."},...filteredProds.map(p=>({v:p.id,l:`${p.nombre} — ${fmt(p.precio)} (stock: ${p.stock||0})`}))]}/>
        </>;
      })()}
      <Inp label="Cantidad" type="number" value={qty} onChange={setQty}/>
      {user.role==="admin"&&<Sel label="Vendedor" value={vendedorId} onChange={setVendedorId} options={[{v:"",l:"Sin asignar"},...DB.colaboradores().map(c=>({v:c.id,l:c.nombre}))]}/>}
      <Sel label="Método de pago" value={pagMethod} onChange={setPagMethod} options={[{v:"efectivo",l:"💵 Efectivo"},{v:"transferencia",l:"🏦 Transferencia"},{v:"tarjeta",l:"💳 Tarjeta"},{v:"credito",l:"📋 Crédito"}]}/>
      <Inp label="Descuento ($)" type="number" value={descuento} onChange={setDescuento}/>
      {prod&&qty&&<Card style={{padding:"14px",marginBottom:16,background:`${br.accent}08`}}>
        {(()=>{const p=productos.find(x=>x.id===prod);if(!p)return null;const s=Number(p.precio)*Number(qty||1)-Number(descuento||0);const u=s-Number(p.costo)*Number(qty||1);return <>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.82rem",marginBottom:6}}><span style={{color:G.dim}}>Subtotal</span><span>{fmt(Number(p.precio)*Number(qty||1))}</span></div>
          {Number(descuento)>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:"0.82rem",marginBottom:6}}><span style={{color:G.dim}}>Descuento</span><span style={{color:G.red}}>-{fmt(descuento)}</span></div>}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.95rem",fontWeight:800,marginBottom:6}}><span>Total</span><span style={{color:br.accent}}>{fmt(s)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.78rem"}}><span style={{color:G.dim}}>Utilidad est.</span><span style={{color:G.green}}>{fmt(u)}</span></div>
        </>})()}
      </Card>}
      <Btn onClick={nuevaVenta} full color={br.accent}>✓ Registrar venta</Btn>
    </Modal>}
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
  </div>;
}

// ── PRODUCTOS ──────────────────────────────────────────────
function Productos({user,isAdmin}){
  const br=DB.brand();
  const[productos,setProductos]=useState(DB.productos());
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState("");
  const[busca,setBusca]=useState("");
  const[scanner,setScanner]=useState(false);
  const[form,setForm]=useState({nombre:"",costo:"",precio:"",stock:"",categoria:"fundas",proveedor:"",codigo:""});
  function handleScan(codigo){setScanner(false);setForm(f=>({...f,codigo}));toast_(`✓ Código capturado: ${codigo}`);}
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}
  function editar(p){setForm({nombre:p.nombre,costo:String(p.costo),precio:String(p.precio),stock:String(p.stock),categoria:p.categoria,proveedor:p.proveedor||"",codigo:p.codigo||""});setModal(p.id);}
  function eliminar(id){const prev=DB.productos().find(p=>p.id===id);const ps=DB.productos().filter(p=>p.id!==id);DB.saveProductos(ps);setProductos(ps);pushUndo({label:`Producto "${prev?.nombre}" eliminado`,undo:()=>{const r=[...DB.productos(),prev];DB.saveProductos(r);setProductos(r);},edit:()=>{setForm({nombre:prev.nombre,costo:String(prev.costo),precio:String(prev.precio),stock:String(prev.stock),categoria:prev.categoria,proveedor:prev.proveedor||"",codigo:prev.codigo||""});setModal(prev.id);}});}
  function guardar(){
    if(!form.nombre||!form.costo||!form.precio){toast_("⚠ Nombre, costo y precio son requeridos","#ff3d6e");return;}
     const ps=DB.productos();
     if(modal==="nuevo"){
       const p={...form,id:uid(),costo:Number(form.costo),precio:Number(form.precio),stock:Number(form.stock||0),createdAt:today()};
       const nps=[...ps,p];DB.saveProductos(nps);setProductos(nps);
       pushUndo({label:`Producto "${p.nombre}" agregado`,undo:()=>{const r=DB.productos().filter(x=>x.id!==p.id);DB.saveProductos(r);setProductos(r);},edit:()=>{setForm({nombre:p.nombre,costo:String(p.costo),precio:String(p.precio),stock:String(p.stock),categoria:p.categoria,proveedor:p.proveedor||"",codigo:p.codigo||""});setModal(p.id);}});
     }else{
       const prev=ps.find(x=>x.id===modal);
       const p={...prev,...form,id:modal,costo:Number(form.costo),precio:Number(form.precio),stock:Number(form.stock||0)};
       const nps=ps.map(x=>x.id===modal?p:x);
       DB.saveProductos(nps);setProductos(nps);
       pushUndo({label:`Producto "${p.nombre}" modificado`,undo:()=>{const r=DB.productos().map(x=>x.id===prev.id?prev:x);DB.saveProductos(r);setProductos(r);},edit:()=>{setForm({nombre:p.nombre,costo:String(p.costo),precio:String(p.precio),stock:String(p.stock),categoria:p.categoria,proveedor:p.proveedor||"",codigo:p.codigo||""});setModal(p.id);}});
     }
     setModal(null);setForm({nombre:"",costo:"",precio:"",stock:"",categoria:"fundas",proveedor:"",codigo:""});
   }
  const totalInventario=productos.reduce((a,p)=>a+Number(p.precio)*Number(p.stock||0),0);
   const filtrados=busca?productos.filter(p=>p.nombre.toLowerCase().includes(busca.toLowerCase())||(p.codigo&&p.codigo.toLowerCase().includes(busca.toLowerCase()))):productos;
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div><div style={{fontWeight:800,fontSize:"1.1rem"}}>Productos</div><div style={{fontSize:"0.7rem",color:G.dim}}>{productos.length} artículos · {fmt(totalInventario)} inventario</div></div>
        <Btn onClick={()=>{setForm({nombre:"",costo:"",precio:"",stock:"",categoria:"fundas",proveedor:""});setModal("nuevo");}} color={br.accent} small>+ Agregar</Btn>
      </div>
      <Inp icon="🔍" placeholder="Buscar producto..." value={busca} onChange={setBusca} style={{marginBottom:0}}/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",paddingBottom:80}}>
      {filtrados.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:G.dim}}>Sin productos</div>}
      {filtrados.map(p=>{
        const margen=p.precio>0?Math.round(((p.precio-p.costo)/p.precio)*100):0;
        const stockBajo=Number(p.stock||0)<=5;
        return <Card key={p.id} style={{padding:"14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1,marginRight:12}}>
              <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:2}}>{p.nombre}</div>
              <div style={{fontSize:"0.7rem",color:G.dim}}>{p.categoria} {p.proveedor?`· ${p.proveedor}`:""} {p.codigo?`· 🔖 ${p.codigo}`:""}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>editar(p)} style={{width:30,height:30,borderRadius:9,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,color:br.accent,cursor:"pointer",fontSize:"0.75rem"}}>✎</button>
              <button onClick={()=>eliminar(p.id)} style={{width:30,height:30,borderRadius:9,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.75rem"}}>✕</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {isAdmin&&<div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
              <div style={{fontSize:"0.6rem",color:G.dim,marginBottom:2}}>COSTO</div>
              <div style={{fontSize:"0.82rem",fontWeight:700,color:G.text}}>{fmt(p.costo)}</div>
            </div>}
            <div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
              <div style={{fontSize:"0.6rem",color:G.dim,marginBottom:2}}>PRECIO</div>
              <div style={{fontSize:"0.82rem",fontWeight:700,color:br.accent}}>{fmt(p.precio)}</div>
            </div>
            {isAdmin&&<div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
              <div style={{fontSize:"0.6rem",color:G.dim,marginBottom:2}}>MARGEN</div>
              <div style={{fontSize:"0.82rem",fontWeight:700,color:G.green}}>{margen}%</div>
            </div>}
            <div style={{textAlign:"center",padding:"8px 4px",background:stockBajo?"rgba(255,60,110,0.08)":"rgba(255,255,255,0.03)",borderRadius:10,border:stockBajo?"1px solid #ff3d6e33":"none"}}>
              <div style={{fontSize:"0.6rem",color:G.dim,marginBottom:2}}>STOCK</div>
              <div style={{fontSize:"0.82rem",fontWeight:700,color:stockBajo?G.red:G.text}}>{p.stock||0}</div>
            </div>
          </div>
        </Card>;
      })}
    </div>
    {modal&&<Modal title={modal==="nuevo"?"Nuevo Producto":"Editar Producto"} onClose={()=>setModal(null)}>
      <Inp label="Nombre del producto" placeholder="Ej: Funda iPhone 15 Pro" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {isAdmin&&<Inp label="Costo ($)" type="number" placeholder="0.00" value={form.costo} onChange={v=>setForm(f=>({...f,costo:v}))}/>}
        <Inp label="Precio venta ($)" type="number" placeholder="0.00" value={form.precio} onChange={v=>setForm(f=>({...f,precio:v}))}/>
      </div>
      <Inp label="Stock inicial" type="number" placeholder="0" value={form.stock} onChange={v=>setForm(f=>({...f,stock:v}))}/>
      <Sel label="Categoría" value={form.categoria} onChange={v=>setForm(f=>({...f,categoria:v}))} options={[{v:"fundas",l:"📱 Fundas"},{v:"micas",l:"🔲 Micas/Hidrogel"},{v:"cargadores",l:"⚡ Cargadores"},{v:"audifonos",l:"🎧 Audífonos"},{v:"accesorios",l:"🔌 Accesorios"},{v:"otros",l:"📦 Otros"}]}/>
      <Inp label="Proveedor" placeholder="Nombre del proveedor" value={form.proveedor} onChange={v=>setForm(f=>({...f,proveedor:v}))}/>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}><div style={{flex:1}}><Inp label="Código de barras / QR" placeholder="Escanea o escribe el código" value={form.codigo} onChange={v=>setForm(f=>({...f,codigo:v}))}/></div><Btn onClick={()=>setScanner("form")} color={G.blue} small style={{marginBottom:14,height:44}}>📷</Btn></div>
      {form.costo&&form.precio&&<Card style={{padding:"12px",marginBottom:14,background:`${br.accent}08`}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.82rem"}}>
          <span style={{color:G.dim}}>Utilidad por unidad</span>
          <span style={{color:G.green,fontWeight:700}}>{fmt(Number(form.precio)-Number(form.costo))} ({form.precio>0?Math.round(((form.precio-form.costo)/form.precio)*100):0}%)</span>
        </div>
      </Card>}
      <Btn onClick={guardar} full color={br.accent}>✓ {modal==="nuevo"?"Agregar producto":"Guardar cambios"}</Btn>
    </Modal>}
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
    {scanner&&<Scanner onScan={handleScan} onClose={()=>setScanner(false)}/>}
  </div>;
}

// ── COLABORADORES ──────────────────────────────────────────
function Colaboradores({isAdmin,isPrimaryAdmin}){
  const br=DB.brand();
  const[colabs,setColabs]=useState(DB.colaboradores());
  const[users,setUsers]=useState(DB.users());
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState("");
  const[form,setForm]=useState({nombre:"",email:"",telefono:"",cargo:"vendedor",comision:"10",zona:""});
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}
  function guardar(){
    if(!form.nombre){toast_("⚠ Nombre requerido","#ff3d6e");return;}
    const cs=DB.colaboradores();
    if(modal==="nuevo"){
      const c={...form,id:uid(),comision:Number(form.comision||10),activo:true,createdAt:today(),ventas:0,totalVentas:0};
      const newColabs=[...cs,c];DB.saveColaboradores(newColabs);setColabs(newColabs);pushUndo({label:`Colaborador "${c.nombre}" agregado`,undo:()=>{const r=DB.colaboradores().filter(x=>x.id!==c.id);DB.saveColaboradores(r);setColabs(r);},edit:()=>{setForm({nombre:c.nombre,email:c.email||"",telefono:c.telefono||"",cargo:c.cargo||"vendedor",comision:String(c.comision||10),zona:c.zona||""});setModal(c.id);}});
    }else{
      const prevColab=cs.find(c=>c.id===modal);
      const ncs=cs.map(c=>c.id===modal?{...c,...form,comision:Number(form.comision||10)}:c);
      DB.saveColaboradores(ncs);setColabs(ncs);pushUndo({label:`Colaborador "${form.nombre}" modificado`,undo:()=>{const r=DB.colaboradores().map(c=>c.id===prevColab.id?prevColab:c);DB.saveColaboradores(r);setColabs(r);},edit:()=>{setForm({nombre:form.nombre,email:form.email||"",telefono:form.telefono||"",cargo:form.cargo||"vendedor",comision:String(form.comision||10),zona:form.zona||""});setModal(modal);}});
    }
    setModal(null);
  }
  function toggleActivo(id){const cs=DB.colaboradores().map(c=>c.id===id?{...c,activo:!c.activo}:c);DB.saveColaboradores(cs);setColabs(cs);}
  function toggleAdmin2(id){const cs=DB.colaboradores().map(c=>{if(c.id!==id)return c;const newRole=c.role==="admin2"?"vendedor":"admin2";const users=DB.users();if(c.email&&users[c.email]){users[c.email].role=newRole;DB.saveUsers(users);}return{...c,role:newRole};});DB.saveColaboradores(cs);setColabs(cs);}
  function aprobarUser(email,plan){const u=DB.users();if(!u[email])return;u[email].status="approved";u[email].plan=plan;u[email].approvedAt=new Date().toISOString();DB.saveUsers(u);setUsers({...u});toast_("✓ Usuario aprobado");}
  function rechazarUser(email){const u=DB.users();if(!u[email])return;u[email].status="rejected";DB.saveUsers(u);setUsers({...u});toast_("✗ Usuario rechazado","#ff3d6e");}
  const pendientes=Object.values(users).filter(u=>u.status==="pending"&&u.role!=="admin");
  const ventas=DB.ventas();
  function statsColab(c){const vs=ventas.filter(v=>v.vendedorId===c.id);return{ventas:vs.length,total:vs.reduce((a,v)=>a+Number(v.total||0),0),comision:vs.reduce((a,v)=>a+Number(v.comisionMonto||0),0)};}

    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:800,fontSize:"1.1rem"}}>Colaboradores</div><div style={{fontSize:"0.7rem",color:G.dim}}>{colabs.filter(c=>c.activo).length} activos</div></div>
        <Btn onClick={()=>{setForm({nombre:"",email:"",telefono:"",cargo:"vendedor",comision:"10",zona:""});setModal("nuevo");}} color={br.accent} small>+ Alta</Btn>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",paddingBottom:80}}>
      {pendientes.length>0&&<><div style={{fontSize:"0.7rem",color:G.yellow,letterSpacing:"0.08em",marginBottom:8,textTransform:"uppercase"}}>⏳ Accesos pendientes ({pendientes.length})</div>
        {pendientes.map(u=><Card key={u.email} style={{padding:"14px",marginBottom:10,background:`${G.yellow}08`,border:`1px solid ${G.yellow}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:"0.85rem"}}>{u.name}</div><div style={{fontSize:"0.7rem",color:G.dim}}>{u.email}</div></div>
            <div style={{display:"flex",gap:6}}>
              <Btn small ghost color={br.accent} onClick={()=>aprobarUser(u.email,"lifetime")}>✓</Btn>
              <Btn small ghost color={G.red} onClick={()=>rechazarUser(u.email)}>✕</Btn>
            </div>
          </div>
        </Card>)}</>}
      <div style={{fontSize:"0.7rem",color:G.dim,letterSpacing:"0.08em",marginBottom:8,textTransform:"uppercase"}}>Equipo</div>
      {colabs.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:G.dim,fontSize:"0.82rem"}}>Sin colaboradores registrados</div>}
      {colabs.map(c=>{const s=statsColab(c);return <Card key={c.id} style={{padding:"16px",marginBottom:10,opacity:c.activo?1:0.5}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{width:42,height:42,borderRadius:14,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:br.accent,fontSize:"1.1rem"}}>{c.nombre[0]}</div>
            <div><div style={{display:"flex",gap:6,alignItems:"center"}}><div style={{fontWeight:700}}>{c.nombre}</div>{c.role==="admin2"&&<div style={{background:"rgba(206,147,216,0.2)",color:"#CE93D8",fontSize:"0.6rem",fontWeight:700,padding:"2px 7px",borderRadius:10}}>ADMIN 2</div>}</div><div style={{fontSize:"0.7rem",color:G.dim}}>{c.cargo} {c.zona?`· ${c.zona}`:""}</div></div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>toggleActivo(c.id)} style={{fontSize:"0.65rem",padding:"4px 10px",borderRadius:50,background:c.activo?`${G.green}18`:"rgba(255,255,255,0.05)",border:`1px solid ${c.activo?G.green+"44":G.gb}`,color:c.activo?G.green:G.dim,cursor:"pointer"}}>{c.activo?"Activo":"Inactivo"}</button>
            <button onClick={()=>{setForm({nombre:c.nombre,email:c.email||"",telefono:c.telefono||"",cargo:c.cargo||"vendedor",comision:String(c.comision||10),zona:c.zona||""});setModal(c.id);}} style={{width:28,height:28,borderRadius:9,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,color:br.accent,cursor:"pointer",fontSize:"0.75rem"}}>✎</button>
            {isPrimaryAdmin&&<button onClick={()=>toggleAdmin2(c.id)} title={c.role==="admin2"?"Quitar Admin 2":"Dar Admin 2"} style={{width:28,height:28,borderRadius:9,background:c.role==="admin2"?"rgba(206,147,216,0.18)":"rgba(255,255,255,0.05)",border:`1px solid ${c.role==="admin2"?"#CE93D844":G.gb}`,color:c.role==="admin2"?"#CE93D8":G.dim,cursor:"pointer",fontSize:"0.75rem"}}>👑</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
            <div style={{fontSize:"0.58rem",color:G.dim,marginBottom:2}}>VENTAS</div>
            <div style={{fontSize:"0.88rem",fontWeight:700}}>{s.ventas}</div>
          </div>
          <div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
            <div style={{fontSize:"0.58rem",color:G.dim,marginBottom:2}}>TOTAL</div>
            <div style={{fontSize:"0.82rem",fontWeight:700,color:br.accent}}>{fmt(s.total)}</div>
          </div>
          <div style={{textAlign:"center",padding:"8px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}>
            <div style={{fontSize:"0.58rem",color:G.dim,marginBottom:2}}>COMISIÓN {c.comision}%</div>
            <div style={{fontSize:"0.82rem",fontWeight:700,color:G.yellow}}>{fmt(s.comision)}</div>
          </div>
        </div>
        {c.email&&<div style={{marginTop:8,fontSize:"0.7rem",color:G.dim}}>✉ {c.email} {c.telefono?`· 📞 ${c.telefono}`:""}</div>}
      </Card>;})}
    </div>
    {modal&&<Modal title={modal==="nuevo"?"Alta Colaborador":"Editar Colaborador"} onClose={()=>setModal(null)}>
      <Inp label="Nombre completo" placeholder="Nombre del colaborador" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))}/>
      <Inp label="Email" type="email" placeholder="correo@ejemplo.com" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/>
      <Inp label="Teléfono" type="tel" placeholder="000-000-0000" value={form.telefono} onChange={v=>setForm(f=>({...f,telefono:v}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Sel label="Cargo" value={form.cargo} onChange={v=>setForm(f=>({...f,cargo:v}))} options={[{v:"vendedor",l:"Vendedor"},{v:"supervisor",l:"Supervisor"},{v:"gerente",l:"Gerente"},{v:"almacen",l:"Almacén"},{v:"cajero",l:"Cajero"}]}/>
        <Inp label="Comisión (%)" type="number" placeholder="10" value={form.comision} onChange={v=>setForm(f=>({...f,comision:v}))}/>
      </div>
      <Inp label="Zona / Sucursal" placeholder="Ej: Zona Norte, Sucursal 1..." value={form.zona} onChange={v=>setForm(f=>({...f,zona:v}))}/>
      <Btn onClick={guardar} full color={br.accent}>✓ {modal==="nuevo"?"Dar de alta":"Guardar cambios"}</Btn>
    </Modal>}
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
  </div>;
}

// ── PROVEEDORES ────────────────────────────────────────────
function Proveedores({isAdmin}){
  const br=DB.brand();
  const[provs,setProvs]=useState(DB.proveedores());

  function guardar(){
    if(!form.nombre){toast_("⚠ Nombre requerido","#ff3d6e");return;}
    const ps=DB.proveedores();

        <Btn onClick={()=>{setForm({nombre:"",contacto:"",telefono:"",email:"",categoria:"fundas",credito:"0",notas:""});setModal("nuevo");}} color={br.accent} small>+ Agregar</Btn>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",paddingBottom:80}}>
      {provs.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:G.dim,fontSize:"0.82rem"}}>Sin proveedores registrados</div>}
      {provs.map(p=><Card key={p.id} style={{padding:"16px",marginBottom:10}}>

            <div style={{fontSize:"0.7rem",color:G.dim}}>{p.categoria} {p.contacto?`· ${p.contacto}`:""}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setForm({nombre:p.nombre,contacto:p.contacto||"",telefono:p.telefono||"",email:p.email||"",categoria:p.categoria||"fundas",credito:String(p.credito||0),notas:p.notas||""});setModal(p.id);}} style={{width:28,height:28,borderRadius:9,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,color:br.accent,cursor:"pointer",fontSize:"0.75rem"}}>✎</button>
            <button onClick={()=>eliminar(p.id)} style={{width:28,height:28,borderRadius:9,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.75rem"}}>✕</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {p.telefono&&<div style={{fontSize:"0.72rem",padding:"4px 10px",borderRadius:50,background:`${br.accent}12`,border:`1px solid ${br.accent}22`,color:br.accent}}>📞 {p.telefono}</div>}
          {p.email&&<div style={{fontSize:"0.72rem",padding:"4px 10px",borderRadius:50,background:`${br.accent2}12`,border:`1px solid ${br.accent2}22`,color:br.accent2}}>✉ {p.email}</div>}
          {Number(p.credito)>0&&<div style={{fontSize:"0.72rem",padding:"4px 10px",borderRadius:50,background:`${G.yellow}12`,border:`1px solid ${G.yellow}22`,color:G.yellow}}>Crédito: {fmt(p.credito)}</div>}
        </div>
        {p.notas&&<div style={{marginTop:8,fontSize:"0.72rem",color:G.dim,fontStyle:"italic"}}>"{p.notas}"</div>}
      </Card>)}

    {modal&&<Modal title={modal==="nuevo"?"Nuevo Proveedor":"Editar Proveedor"} onClose={()=>setModal(null)}>
      <Inp label="Nombre / Empresa" placeholder="Nombre del proveedor" value={form.nombre} onChange={v=>setForm(f=>({...f,nombre:v}))}/>
      <Inp label="Contacto" placeholder="Nombre del contacto" value={form.contacto} onChange={v=>setForm(f=>({...f,contacto:v}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label="Teléfono" type="tel" value={form.telefono} onChange={v=>setForm(f=>({...f,telefono:v}))}/>

    </Modal>}
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
  </div>;
}

// ── FINANZAS ───────────────────────────────────────────────
function Finanzas({isAdmin}){
  const br=DB.brand();
  const[gastos,setGastos]=useState(DB.gastos());
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({concepto:"",monto:"",categoria:"operativo",fecha:today(),notas:""});
  const[toast,setToast]=useState("");
  const[filtro,setFiltro]=useState("mes");
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}
  function agregar(){
    if(!form.concepto||!form.monto){toast_("⚠ Concepto y monto requeridos","#ff3d6e");return;}
    const g={...form,id:uid(),monto:Number(form.monto)};
    const ng=[...gastos,g];DB.saveGastos(ng);setGastos(ng);
    setModal(false);setForm({concepto:"",monto:"",categoria:"operativo",fecha:today(),notas:""});
    toast_("✓ Gasto registrado");
  }
  function eliminar(id){const prev=DB.gastos().find(g=>g.id===id);const ng=DB.gastos().filter(g=>g.id!==id);DB.saveGastos(ng);setGastos(ng);pushUndo({label:`Gasto "${prev?.concepto||"Gasto"}" eliminado`,undo:()=>{const r=[...DB.gastos(),prev];DB.saveGastos(r);setGastos(r);},edit:()=>{setForm({concepto:prev.concepto||"",monto:String(prev.monto||""),categoria:prev.categoria||"operativo",fecha:prev.fecha||today(),notas:prev.notas||""});setModal(true);}});}
  const ventas=DB.ventas();
  const hoy=today();
  const filtrar=(items)=>{
    if(filtro==="hoy")return items.filter(x=>x.fecha===hoy);
    if(filtro==="semana"){const s=new Date();s.setDate(s.getDate()-7);return items.filter(x=>new Date(x.fecha)>=s);}
    if(filtro==="mes"){const m=new Date();m.setDate(m.getDate()-30);return items.filter(x=>new Date(x.fecha)>=m);}
    return items;
  };
  const ventasFilt=filtrar(ventas);const gastosFilt=filtrar(gastos);
  const ingresos=ventasFilt.reduce((a,v)=>a+Number(v.total||0),0);
  const utilidadBruta=ventasFilt.reduce((a,v)=>a+Number(v.utilidad||0),0);
  const totalGastos=gastosFilt.reduce((a,g)=>a+Number(g.monto||0),0);
  const utilidadNeta=utilidadBruta-totalGastos;
  const comisiones=ventasFilt.reduce((a,v)=>a+Number(v.comisionMonto||0),0);
  const porCategoria={};gastosFilt.forEach(g=>{if(!porCategoria[g.categoria])porCategoria[g.categoria]=0;porCategoria[g.categoria]+=Number(g.monto||0);});
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:"1.1rem"}}>Finanzas</div>
        <Btn onClick={()=>setModal(true)} color={br.accent} small>+ Gasto</Btn>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto"}}>
        {[["hoy","Hoy"],["semana","7 días"],["mes","30 días"],["todo","Todo"]].map(([f,l])=>
          <Pill key={f} active={filtro===f} color={br.accent} onClick={()=>setFiltro(f)}>{l}</Pill>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px",paddingBottom:80}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <StatCard label="Ingresos" value={fmt(ingresos)} color={br.accent} icon="💰"/>
        <StatCard label="Ut. Bruta" value={fmt(utilidadBruta)} color={G.green} icon="📈"/>
        <StatCard label="Gastos" value={fmt(totalGastos)} color={G.red} icon="💸"/>
        <StatCard label="Ut. Neta" value={fmt(utilidadNeta)} sub={utilidadNeta>=0?"✓ Positivo":"⚠ Negativo"} color={utilidadNeta>=0?G.green:G.red} icon={utilidadNeta>=0?"🎯":"⚠️"}/>
      </div>
      <Card style={{padding:"16px",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:"0.85rem",marginBottom:12}}>Resumen financiero</div>
        {[["Ventas brutas",ingresos,br.accent],["Costo de ventas",ingresos-utilidadBruta,G.red],["Utilidad bruta",utilidadBruta,G.green],["Gastos operativos",totalGastos,G.red],["Comisiones pagadas",comisiones,G.yellow],["Utilidad neta",utilidadNeta,utilidadNeta>=0?G.green:G.red]].map(([l,v,c])=>
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${G.dim2}`,fontSize:"0.82rem"}}>
            <span style={{color:G.dim}}>{l}</span><span style={{fontWeight:700,color:c}}>{fmt(v)}</span>
          </div>)}
      </Card>
      {Object.keys(porCategoria).length>0&&<Card style={{padding:"16px",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:"0.85rem",marginBottom:12}}>Gastos por categoría</div>
        {Object.entries(porCategoria).sort((a,b)=>b[1]-a[1]).map(([cat,monto])=>
          <div key={cat} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.78rem",marginBottom:4}}>
              <span style={{color:G.dim,textTransform:"capitalize"}}>{cat}</span><span style={{color:G.red}}>{fmt(monto)}</span>
            </div>
            <div style={{height:4,borderRadius:4,background:G.dim2}}><div style={{height:"100%",width:`${totalGastos>0?(monto/totalGastos)*100:0}%`,background:`linear-gradient(90deg,${G.red},${G.orange})`,borderRadius:4}}/></div>
          </div>)}
      </Card>}
      <div style={{fontSize:"0.7rem",color:G.dim,letterSpacing:"0.08em",marginBottom:8,textTransform:"uppercase"}}>Gastos recientes</div>
      {gastosFilt.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:G.dim,fontSize:"0.82rem"}}>Sin gastos en este período</div>}
      {gastosFilt.slice().reverse().map(g=><Card key={g.id} style={{padding:"12px 14px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:"0.85rem"}}>{g.concepto}</div>
            <div style={{fontSize:"0.7rem",color:G.dim}}>{g.categoria} · {g.fecha}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontWeight:700,color:G.red}}>{fmt(g.monto)}</span>
            <button onClick={()=>eliminar(g.id)} style={{width:26,height:26,borderRadius:8,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.7rem"}}>✕</button>
          </div>
        </div>
        {g.notas&&<div style={{fontSize:"0.7rem",color:G.dim,marginTop:4,fontStyle:"italic"}}>"{g.notas}"</div>}
      </Card>)}
    </div>
    {modal&&<Modal title="Nuevo Gasto" onClose={()=>setModal(false)}>

// ── SCANNER ────────────────────────────────────────────────
function Scanner({onScan,onClose}){
  const videoRef=useRef(null);
  const[err,setErr]=useState("");
  const[scanning,setScanning]=useState(true);
  const br=DB.brand();
  useEffect(()=>{
    let stream=null;let interval=null;
    async function start(){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
        if("BarcodeDetector" in window){
          const detector=new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","qr_code","upc_a","upc_e"]});
          interval=setInterval(async()=>{if(videoRef.current&&videoRef.current.readyState===4){try{const codes=await detector.detect(videoRef.current);if(codes.length>0){clearInterval(interval);setScanning(false);onScan(codes[0].rawValue);}}catch(e){}}},500);
        }else{setErr("Escáner no disponible en este navegador. Ingresa el código manualmente.");}
      }catch(e){setErr("No se pudo acceder a la cámara. Verifica los permisos.");}
    }
    start();
    return()=>{if(stream)stream.getTracks().forEach(t=>t.stop());if(interval)clearInterval(interval);};
  },[]);
  return <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
    <div style={{position:"relative",width:"100%",maxWidth:400,padding:"0 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{color:"white",fontFamily:G.font,fontWeight:700,fontSize:"1rem"}}>📷 Escanear código</div>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:10,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"white",cursor:"pointer",fontSize:"1rem"}}>✕</button>
      </div>
      <div style={{position:"relative",borderRadius:20,overflow:"hidden",background:"#000",aspectRatio:"1"}}>
        <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover"}} playsInline muted/>
        {scanning&&!err&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{width:"60%",height:"60%",border:`3px solid ${br.accent}`,borderRadius:16,boxShadow:`0 0 0 9999px rgba(0,0,0,0.5),inset 0 0 30px ${br.accent}22`}}/></div>}
        {err&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"rgba(0,0,0,0.8)"}}><div style={{color:"#ff3d6e",fontFamily:G.font,fontSize:"0.82rem",textAlign:"center"}}>{err}</div></div>}
      </div>
      {scanning&&!err&&<div style={{color:"rgba(255,255,255,0.5)",fontFamily:G.font,fontSize:"0.78rem",textAlign:"center",marginTop:12}}>Apunta la cámara al código de barras o QR</div>}
    </div>
  </div>;
}

function InstallPWA(){
  const[prompt,setPrompt]=useState(null);
  const[installed,setInstalled]=useState(false);
  const br=DB.brand();
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setPrompt(e);};
    window.addEventListener("beforeinstallprompt",handler);
    window.addEventListener("appinstalled",()=>setInstalled(true));

    return()=>window.removeEventListener("beforeinstallprompt",handler);

// ── APROBACIONES ───────────────────────────────────────────
function Aprobaciones({isAdmin}){
  const br=DB.brand();
  const[pendientes,setPendientes]=useState(()=>DB.get("sn_pendientes",[]));
  const[toast,setToast]=useState("");
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}
  useEffect(()=>{
    if(!window._db||!window._fs)return;
    const unsub=window._fs.onSnapshot(window._fs.collection(window._db,"pendientes"),snap=>{const items=[];snap.forEach(d=>{const dat=d.data();if(dat.status==="pendiente")items.push(dat);});setPendientes(items);DB.set("sn_pendientes",items);});
    return()=>unsub();
  },[]);
  function aprobar(req){const prods=DB.productos();if(req.tipo==="nuevo_producto"){const p={id:uid(),nombre:req.data.nombre,costo:0,precio:Number(req.data.precio),stock:Number(req.data.stock||0),categoria:req.data.categoria||"fundas",proveedor:req.data.proveedor||"",codigo:req.data.codigo||""};DB.saveProductos([...prods,p]);}else if(req.tipo==="editar_producto"){const np=prods.map(p=>p.id===req.productoId?{...p,nombre:req.data.nombre,precio:Number(req.data.precio),stock:Number(req.data.stock||0),categoria:req.data.categoria||p.categoria}:p);DB.saveProductos(np);}eliminarPendiente(req.id);toast_("✓ Solicitud aprobada y aplicada");}
  function rechazar(req){eliminarPendiente(req.id);toast_("Solicitud rechazada","#ff3d6e");}
  function eliminarPendiente(id){const arr=pendientes.filter(p=>p.id!==id);setPendientes(arr);DB.set("sn_pendientes",arr);if(window._db&&window._fs){window._fs.deleteDoc(window._fs.doc(window._db,"pendientes",id)).catch(()=>{});}}
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}><div style={{fontWeight:800,fontSize:"1.1rem"}}>✅ Aprobaciones</div><div style={{fontSize:"0.7rem",color:G.dim}}>{pendientes.length} solicitudes pendientes</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"16px",paddingBottom:80}}>
      {pendientes.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:G.dim,fontSize:"0.82rem"}}>Sin solicitudes pendientes ✓</div>}
      {pendientes.map(req=><Card key={req.id} style={{padding:"16px",marginBottom:12,border:`1px solid ${G.yellow}33`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontWeight:700,fontSize:"0.85rem",marginBottom:2}}>{req.tipo==="nuevo_producto"?"📦 Nuevo producto":"✏️ Editar producto"}</div><div style={{fontSize:"0.7rem",color:G.dim}}>{req.solicitante} · {req.fecha}</div></div><div style={{background:`${G.yellow}22`,color:G.yellow,fontSize:"0.65rem",fontWeight:700,padding:"3px 8px",borderRadius:10}}>PENDIENTE</div></div>
        <div style={{background:G.glass,borderRadius:10,padding:"10px",marginBottom:12,fontSize:"0.78rem"}}>{[["Nombre",req.data.nombre],["Precio",`$${req.data.precio}`],["Stock",req.data.stock||0],["Categoría",req.data.categoria]].map(([l,v])=><div key={l} style={{display:"flex",gap:8,marginBottom:4}}><span style={{color:G.dim,minWidth:70}}>{l}:</span><span style={{fontWeight:600}}>{v}</span></div>)}</div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>aprobar(req)} color={G.green} style={{flex:1}}>✓ Aprobar</Btn><Btn onClick={()=>rechazar(req)} color={G.red} style={{flex:1}}>✕ Rechazar</Btn></div>
      </Card>)}
    </div>
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
  </div>;
}

// ── CÓDIGOS DE ACCESO ──────────────────────────────────────
const ADMIN_USER={name:"Admin",email:"rikaspalos@gmail.com",role:"admin",plan:"lifetime",status:"approved",approvedAt:new Date().toISOString()};

function getCodigosDB(){return DB.get("sn_codigos",{});}
async function saveCodigosDB(c){DB.set("sn_codigos",c);if(window._db&&window._fs){try{await window._fs.setDoc(window._fs.doc(window._db,"config","codigos"),{data:JSON.stringify(c),ts:Date.now()});}catch(e){}}}
function syncCodigos(cb){if(!window._db||!window._fs)return;window._fs.onSnapshot(window._fs.doc(window._db,"config","codigos"),snap=>{const d=snap.data();if(d&&d.data){try{const c=JSON.parse(d.data);DB.set("sn_codigos",c);cb(c);}catch(e){}}});}

// ── PANTALLA DE CÓDIGO ─────────────────────────────────────
function AccesoCodigo({onAuth}){
  const br=DB.brand();
  const[codigo,setCodigo]=useState("");
  const[nombre,setNombre]=useState("");
  const[telefono,setTelefono]=useState("");
  const[err,setErr]=useState("");
  const[loading,setL]=useState(false);
  const[step,setStep]=useState(1); // 1=código, 2=datos

  async function verificarCodigo(){
    if(!codigo.trim()){setErr("Ingresa tu código de acceso");return;}
    setL(true);setErr("");
    // Sync desde Firebase primero
    let codigos=getCodigosDB();
    if(window._db&&window._fs){
      try{
        const snap=await window._fs.getDocs(window._fs.collection(window._db,"config"));
        snap.forEach(d=>{if(d.id==="codigos"&&d.data().data){try{codigos=JSON.parse(d.data().data);DB.set("sn_codigos",codigos);}catch(e){}}});
      }catch(e){}
    }
    const c=codigos[codigo.toUpperCase().trim()];
    if(!c){setErr("Código inválido o no existe");setL(false);return;}
    if(c.usado){setErr("Este código ya fue utilizado");setL(false);return;}
    if(c.vence&&new Date()>new Date(c.vence)){setErr("Este código ha vencido");setL(false);return;}
    setL(false);setStep(2);
  }

  async function entrar(){
    if(!nombre.trim()){setErr("Ingresa tu nombre");return;}
    if(!telefono.trim()){setErr("Ingresa tu teléfono");return;}
    setL(true);
    const codigos=getCodigosDB();
    const key=codigo.toUpperCase().trim();
    codigos[key]={...codigos[key],usado:true,usadoPor:nombre,telefono,usadoEn:new Date().toISOString()};
    await saveCodigosDB(codigos);
    const u={name:nombre,telefono,role:"vendedor",plan:"invitado",codigo:key,status:"approved",approvedAt:new Date().toISOString()};
    DB.saveSession(u);
    onAuth(u);
  }

  return <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:G.font,position:"relative",overflow:"hidden"}}>
    <Bg a={br.accent} b={br.accent2}/>
    <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:380,animation:"si 0.5s ease"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16,filter:`drop-shadow(0 0 28px ${br.accent}55)`}}>
          <svg width="80" height="80" viewBox="0 0 140 140" fill="none">
            <defs>
              <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={br.accent}/><stop offset="100%" stopColor={br.accent2}/></linearGradient>
              <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={br.accent} stopOpacity="0.2"/><stop offset="100%" stopColor={br.accent2} stopOpacity="0.1"/></linearGradient>
            </defs>
            <polygon points="70,17 115,42 115,98 70,123 25,98 25,42" fill="url(#lg2)" stroke="url(#lg1)" strokeWidth="1.75"/>
            <path d="M50 38 L50 77 Q50 97 70 97 Q90 97 90 77 L90 38" fill="none" stroke="white" strokeWidth="10" strokeLinecap="round"/>
            <circle cx="98" cy="33" r="6.5" fill={br.accent}/><circle cx="98" cy="33" r="3" fill="white"/>
          </svg>
        </div>
        <div style={{fontWeight:900,letterSpacing:"0.16em",fontSize:"2.8rem",background:`linear-gradient(135deg,#fff 0%,${br.accent} 50%,${br.accent2} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{br.name}</div>
        <div style={{width:40,height:2,background:`linear-gradient(90deg,${br.accent},${br.accent2})`,borderRadius:2,margin:"8px auto"}}/>
        <div style={{fontSize:"0.58rem",color:G.dim,letterSpacing:"0.45em",textTransform:"uppercase"}}>{br.sub}</div>
      </div>
      <Card style={{padding:26}}>
        {step===1&&<>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:"2rem",marginBottom:8}}>🔑</div>
            <div style={{fontWeight:700,fontSize:"0.95rem",color:G.text,marginBottom:4}}>Código de acceso</div>
            <div style={{fontSize:"0.78rem",color:G.dim}}>Ingresa el código que te compartieron</div>
          </div>
          <Inp icon="◈" placeholder="Ej: USALA-2026" value={codigo} onChange={v=>setCodigo(v.toUpperCase())} onEnter={verificarCodigo}/>
          {err&&<div style={{padding:"10px 14px",background:"#ff3d6e14",border:"1px solid #ff3d6e44",borderRadius:10,marginBottom:14,fontSize:"0.8rem",color:G.red}}>⚠ {err}</div>}
          <Btn onClick={verificarCodigo} full color={br.accent} style={{opacity:loading?0.7:1}}>{loading?"Verificando...":"Verificar código →"}</Btn>
        </>}
        {step===2&&<>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:"2rem",marginBottom:8}}>✅</div>
            <div style={{fontWeight:700,fontSize:"0.95rem",color:G.text,marginBottom:4}}>Código válido</div>
            <div style={{fontSize:"0.78rem",color:G.dim}}>Completa tus datos para entrar</div>
          </div>
          <Inp icon="👤" label="Nombre completo" placeholder="Tu nombre" value={nombre} onChange={setNombre}/>
          <Inp icon="📞" label="Teléfono" type="tel" placeholder="000-000-0000" value={telefono} onChange={setTelefono} onEnter={entrar}/>
          {err&&<div style={{padding:"10px 14px",background:"#ff3d6e14",border:"1px solid #ff3d6e44",borderRadius:10,marginBottom:14,fontSize:"0.8rem",color:G.red}}>⚠ {err}</div>}
          <Btn onClick={entrar} full color={br.accent} style={{opacity:loading?0.7:1}}>{loading?"Entrando...":"Entrar →"}</Btn>
          <button onClick={()=>{setStep(1);setErr("");}} style={{width:"100%",marginTop:10,padding:"8px",background:"none",border:"none",color:G.dim,fontFamily:G.font,fontSize:"0.78rem",cursor:"pointer"}}>← Cambiar código</button>
        </>}
      </Card>
      <div style={{textAlign:"center",marginTop:16,fontSize:"0.65rem",color:"rgba(232,238,255,0.15)"}}>¿Eres el administrador? <button onClick={()=>{DB.saveSession(ADMIN_USER);window.location.reload();}} style={{background:"none",border:"none",color:"rgba(232,238,255,0.2)",fontFamily:G.font,fontSize:"0.65rem",cursor:"pointer"}}>Acceso admin</button></div>
    </div>
  </div>;
}

// ── PANEL ADMIN — GESTIÓN DE CÓDIGOS ──────────────────────
function GestionCodigos(){
  const br=DB.brand();
  const[codigos,setCodigos]=useState(getCodigosDB());
  const[form,setForm]=useState({prefijo:"USALA",vence:"",nota:""});
  const[toast,setToast]=useState("");
  function toast_(m,c){setToast({m,c});setTimeout(()=>setToast(""),3000);}

  useEffect(()=>{syncCodigos(c=>{setCodigos(c);});},[]);

  function generarCodigo(){
    const sufijo=Math.random().toString(36).slice(2,6).toUpperCase();
    const key=`${form.prefijo||"USALA"}-${sufijo}`;
    const c={...getCodigosDB()};
    c[key]={creado:today(),vence:form.vence||null,nota:form.nota||"",usado:false,usadoPor:null,telefono:null};
    saveCodigosDB(c);setCodigos({...c});
    toast_(`✓ Código generado: ${key}`);
    // Copiar al portapapeles
    navigator.clipboard?.writeText(key).catch(()=>{});
  }

  function eliminarCodigo(key){
    const c={...getCodigosDB()};delete c[key];
    saveCodigosDB(c);setCodigos({...c});
    toast_("Código eliminado");
  }

  const activos=Object.entries(codigos).filter(([k,v])=>!v.usado&&(!v.vence||new Date()<=new Date(v.vence)));
  const usados=Object.entries(codigos).filter(([k,v])=>v.usado);
  const vencidos=Object.entries(codigos).filter(([k,v])=>!v.usado&&v.vence&&new Date()>new Date(v.vence));

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gb}`,flexShrink:0}}>
      <div style={{fontWeight:800,fontSize:"1.1rem"}}>🔑 Códigos de Acceso</div>
      <div style={{fontSize:"0.7rem",color:G.dim}}>{activos.length} activos · {usados.length} usados · {vencidos.length} vencidos</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px",paddingBottom:80}}>
      <Card style={{padding:"16px",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:"0.85rem",marginBottom:12}}>➕ Generar nuevo código</div>
        <Inp label="Prefijo" placeholder="USALA" value={form.prefijo} onChange={v=>setForm(f=>({...f,prefijo:v.toUpperCase()}))}/>
        <Inp label="Fecha de vencimiento (opcional)" type="date" value={form.vence} onChange={v=>setForm(f=>({...f,vence:v}))}/>
        <Inp label="Nota (opcional)" placeholder="Para quién es..." value={form.nota} onChange={v=>setForm(f=>({...f,nota:v}))}/>
        <Btn onClick={generarCodigo} full color={br.accent}>🔑 Generar y copiar código</Btn>
      </Card>

      {activos.length>0&&<><div style={{fontSize:"0.7rem",color:G.green,letterSpacing:"0.08em",marginBottom:8,textTransform:"uppercase"}}>✅ Activos ({activos.length})</div>
        {activos.map(([key,v])=><Card key={key} style={{padding:"14px",marginBottom:10,border:`1px solid ${G.green}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:G.mono,fontWeight:800,fontSize:"1rem",color:br.accent,letterSpacing:"0.1em"}}>{key}</div>
              <div style={{fontSize:"0.7rem",color:G.dim,marginTop:2}}>{v.nota||"Sin nota"} {v.vence?`· Vence: ${v.vence}`:""}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{navigator.clipboard?.writeText(key);toast_(`✓ Copiado: ${key}`);}} style={{padding:"6px 12px",borderRadius:10,background:`${br.accent}18`,border:`1px solid ${br.accent}33`,color:br.accent,fontFamily:G.font,fontSize:"0.72rem",fontWeight:600,cursor:"pointer"}}>📋 Copiar</button>
              <button onClick={()=>eliminarCodigo(key)} style={{width:30,height:30,borderRadius:9,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.75rem"}}>✕</button>
            </div>
          </div>
        </Card>)}</>}

      {usados.length>0&&<><div style={{fontSize:"0.7rem",color:G.dim,letterSpacing:"0.08em",marginBottom:8,marginTop:16,textTransform:"uppercase"}}>✓ Usados ({usados.length})</div>
        {usados.map(([key,v])=><Card key={key} style={{padding:"12px 14px",marginBottom:8,opacity:0.6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:G.mono,fontWeight:700,fontSize:"0.88rem",color:G.dim}}>{key}</div>
              <div style={{fontSize:"0.7rem",color:G.dim}}>{v.usadoPor||"?"} · {v.telefono||""} · {v.usadoEn?.split("T")[0]||""}</div>
            </div>
            <button onClick={()=>eliminarCodigo(key)} style={{width:28,height:28,borderRadius:8,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.7rem"}}>✕</button>
          </div>
        </Card>)}</>}

      {vencidos.length>0&&<><div style={{fontSize:"0.7rem",color:G.red,letterSpacing:"0.08em",marginBottom:8,marginTop:16,textTransform:"uppercase"}}>⛔ Vencidos ({vencidos.length})</div>
        {vencidos.map(([key,v])=><Card key={key} style={{padding:"12px 14px",marginBottom:8,opacity:0.5,border:`1px solid ${G.red}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontFamily:G.mono,fontWeight:700,fontSize:"0.88rem",color:G.red}}>{key}</div><div style={{fontSize:"0.7rem",color:G.dim}}>Venció: {v.vence}</div></div>
            <button onClick={()=>eliminarCodigo(key)} style={{width:28,height:28,borderRadius:8,background:"#ff3d6e18",border:"1px solid #ff3d6e33",color:G.red,cursor:"pointer",fontSize:"0.7rem"}}>✕</button>
          </div>
        </Card>)}</>}
    </div>
    {toast&&<Toast msg={toast.m} color={toast.c}/>}
  </div>;
}

function App(){
  const[user,setUser]=useState(()=>DB.session());

  // Admin directo si ya tiene sesión admin guardada
  if(user&&(user.role==="admin"||user.role==="vendedor")){
    return <MainApp user={user} onLogout={()=>{DB.clearSession();setUser(null);}}/>;
  }
  return <AccesoCodigo onAuth={u=>setUser(u)}/>;
}

root.render(<App/>);

<script id="sw-code" type="text/sw-source">
const CACHE="usala-v3";
const ASSETS=["/","./index.html"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{}))));
self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(caches.match(e.request).then(cached=>{const fresh=fetch(e.request).then(r=>{if(r&&r.status===200){const clone=r.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}return r;}).catch(()=>{});return cached||fresh;}));});
</script>
<script>
(async function(){

    const swUrl=URL.createObjectURL(blob);
    const reg=await navigator.serviceWorker.register(swUrl,{scope:"/"});
    window._swReg=reg;
  }catch(e){console.warn("SW failed",e);}
})();
